name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and upload Windows binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: ars-dl
          target: x86_64-pc-windows-msvc
          tar: none
          zip: none
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}