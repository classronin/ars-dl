name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Remove old target directory
        run: Remove-Item -Recurse -Force target -ErrorAction SilentlyContinue

      - name: Build Windows binary
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Verify only exe exists
        run: dir target\x86_64-pc-windows-msvc\release\*.exe

      - name: Upload Windows binary
        uses: softprops/action-gh-release@v2
        with:
          files: target/x86_64-pc-windows-msvc/release/ars-dl.exe